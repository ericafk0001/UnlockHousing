<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <filter id="noiseFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.52" numOctaves="2" seed="17" stitchTiles="stitch" />
    <feColorMatrix type="saturate" values="0" />
    <feComponentTransfer>
      <feFuncR type="gamma" amplitude="1.45" exponent="1.12" offset="-0.05" />
      <feFuncG type="gamma" amplitude="1.45" exponent="1.12" offset="-0.05" />
      <feFuncB type="gamma" amplitude="1.45" exponent="1.12" offset="-0.05" />
    </feComponentTransfer>
  </filter>
  <rect width="100%" height="100%" filter="url(#noiseFilter)" opacity="1" />
</svg>
